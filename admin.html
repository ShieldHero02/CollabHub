<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CollabHub — Админ</title>
  <link rel="stylesheet" href="assets/app.css">
</head>
<body data-page="admin">
  <aside class="sidebar">
    <a class="brand" href="index.html"><span class="brand-mark">CH</span><span><b>CollabHub</b><small>админ-панель</small></span></a>
    <nav class="main-nav" id="mainNav"></nav>
  </aside>

  <main class="workspace">
    <header class="page-head">
      <div>
        <h1>Админ-панель</h1>
        <p>Роли, команды, тимлиды и доступ участников. Управление доступно мастер-аккаунту и админам.</p>
      </div>
      <div class="head-actions">
        <button class="btn primary" id="addTeamBtn">+ команда</button>
        <button class="btn" id="addAccountBtn">+ аккаунт</button>
      </div>
    </header>

    <section class="admin-grid">
      <article class="surface admin-section">
        <div class="surface-head">
          <div><h2>Аккаунты и роли</h2><p>Кто может входить и что может делать.</p></div>
        </div>
        <div class="admin-list" id="accountList"></div>
      </article>

      <article class="surface admin-section">
        <div class="surface-head">
          <div><h2>Команды</h2><p>Группы участников и назначенные тимлиды.</p></div>
        </div>
        <div class="admin-list" id="teamList"></div>
      </article>
    </section>
  </main>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <header><strong id="modalTitle"></strong><button class="icon-btn" id="closeModalBtn">×</button></header>
      <div id="modalBody"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="assets/app-data.js"></script>
  <script src="assets/app-ui.js"></script>
  <script src="assets/page-admin.js"></script>
</body>
</html>
